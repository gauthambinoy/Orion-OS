---
# Orion OS — ISO build & sign workflow (M1, P#1.5)
#
# Builds an installable ISO from the published Orion OCI image, then
# computes and signs a SHA256 checksum with the trust-root cosign key.
# Artifacts are uploaded to the workflow run on every trigger and to
# the GitHub Release on tag pushes.
#
# Why a separate workflow from build-image:
#   - The ISO build is heavy (45+ minutes) and must NOT block the OCI
#     image pipeline that other consumers (e.g. rebase users) rely on.
#   - It depends on a published image, not on source: we want it to run
#     AFTER build-image succeeds, not in parallel.
#
# Trigger model (mirrors build-image where it makes sense):
#   - On push to main or tag: only after build-image succeeds for the
#     same SHA (workflow_run trigger), so we never ship an ISO whose
#     image was never signed.
#   - Manually via workflow_dispatch for one-off ISO rebuilds.
#   - PRs do NOT build an ISO; the diff is verified by the OCI build.
#
# References:
#   - Plan §5.4 (release pipeline)
#   - Plan §5.5 (every published artefact is signed)
#   - https://blue-build.org/how-to/iso/

name: build-iso

on:
  workflow_run:
    workflows: ["build-image"]
    types: [completed]
    branches: [main]

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build the ISO from (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # upload to releases
  packages: read        # pull the OCI image
  id-token: write       # cosign keyless fallback (reserved)

env:
  REGISTRY: ghcr.io
  # Action concatenates as <image_repo>/<image_name>:<image_tag>, and
  # uses image_name verbatim as the local OCI destination path. A '/'
  # in image_name therefore makes skopeo write to a missing directory.
  # Keep image_name simple ("orion") and put the owner in image_repo.
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: orion

jobs:
  build:
    name: build-and-sign-iso
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # Only run for SUCCESSFUL build-image runs. workflow_run fires on
    # every completion (success or failure); we filter here so we never
    # spend 90 minutes building an ISO from a broken image.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine source tag
        id: tag
        run: |
          case "${{ github.event_name }}" in
            release)
              echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT" ;;
            workflow_dispatch)
              echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT" ;;
            workflow_run)
              # workflow_run.head_branch == 'main' and we tag main builds
              # as 'latest' in build-image, so default to that.
              echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Set up cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Build ISO
        id: iso
        uses: jasonn3/build-container-installer@v1.3.0
        with:
          image_name: ${{ env.IMAGE_NAME }}
          image_repo: ${{ env.IMAGE_REPO }}
          image_tag: ${{ steps.tag.outputs.tag }}
          variant: Kinoite
          iso_name: orion-${{ steps.tag.outputs.tag }}.iso

      - name: Compute ISO checksum
        id: sums
        run: |
          ISO_PATH="${{ steps.iso.outputs.iso_path }}"
          if [ -z "${ISO_PATH}" ] || [ ! -f "${ISO_PATH}" ]; then
            echo "ISO not found at expected path" >&2
            exit 1
          fi
          sha256sum "${ISO_PATH}" > "${ISO_PATH}.sha256"
          echo "iso=${ISO_PATH}" >> "$GITHUB_OUTPUT"
          echo "sums=${ISO_PATH}.sha256" >> "$GITHUB_OUTPUT"

      - name: Sign ISO checksum with trust-root key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          # We sign the checksum file, not the ISO itself: the ISO is
          # reproducible from the signed image, and signing it directly
          # would change its bytes after signing. Verifying users:
          #   sha256sum -c orion-<tag>.iso.sha256
          #   cosign verify-blob --key cosign.pub \
          #     --signature orion-<tag>.iso.sha256.sig \
          #     orion-<tag>.iso.sha256
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            --output-signature "${{ steps.sums.outputs.sums }}.sig" \
            "${{ steps.sums.outputs.sums }}"

      - name: Upload ISO artefacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: orion-iso-${{ steps.tag.outputs.tag }}
          path: |
            ${{ steps.sums.outputs.iso }}
            ${{ steps.sums.outputs.sums }}
            ${{ steps.sums.outputs.sums }}.sig
          retention-days: 14

      - name: Attach to GitHub Release (on tag push only)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.sums.outputs.iso }}
            ${{ steps.sums.outputs.sums }}
            ${{ steps.sums.outputs.sums }}.sig
