---
# Orion OS — TPM2 enrollment shell module (M2, P#2.6)
#
# Calamares' partition module sets up LUKS2 with a passphrase. This
# module runs after the system is installed and (best-effort)
# enrolls a TPM2 token so the user gets unattended unlock on every
# subsequent boot.
#
# Plan §5.1 / §7.5: passphrase fallback is MANDATORY. We never
# replace the original passphrase slot; we ADD a TPM2 slot.
# If the TPM dies, the passphrase still works. If TPM enrollment
# fails for any reason, we log it and continue — a non-TPM install
# is degraded but functional, while a failed install is not.

dontChroot: false
timeout: 120
script:
  - command: /usr/libexec/orion/tpm-enroll-luks
    timeout: 120
