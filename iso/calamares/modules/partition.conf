---
# Orion OS — Calamares partitioning defaults (M2, P#2.6)
#
# Plan section 5.1 / 7.5: every Orion install MUST encrypt the root
# filesystem with LUKS2, prefer TPM2 unlock when available, and
# ALWAYS fall back to a passphrase. "Mandatory passphrase fallback"
# is a non-negotiable policy: a user whose TPM dies must still be
# able to recover their machine.
#
# This file is the partition module configuration Calamares reads at
# install time. The TPM2 enrollment itself happens in a post-install
# shell module (orion-tpm-enroll) because Calamares' partition module
# does not yet have a native TPM enrollment knob — see plan §7.4
# (testing rules) and the orion-tpm-enroll script that ships
# alongside this file.

# Encryption defaults
# -------------------
# initialSwapChoice=none    : zram covers swap (P#3.2). No on-disk
#                             swap means no encrypted-swap key
#                             management headache.
# initialPartitioningChoice=erase
#                           : the wizard pre-selects "erase disk"
#                             but the user can still pick manual.
# defaultFileSystemType=btrfs
#                           : matches Aurora upstream; needed for
#                             rpm-ostree subvolumes and Snapper.
# enableLuksAutomatedPartitioning=true
#                           : unlocks the "Encrypt system" checkbox
#                             on the erase-disk path.
# initialEncryption=true    : that checkbox is PRE-CHECKED. Combined
#                             with the QML branding override
#                             (which removes the "uncheck" affordance
#                             in the default Orion brand) this means
#                             every default-flow install is encrypted.
#                             Power users who manual-partition can
#                             still opt out, but they have to do it
#                             on purpose.

efiSystemPartition: /boot/efi
efiSystemPartitionSize: 512MiB
efiSystemPartitionName: EFI

userSwapChoices:
  - none

defaultFileSystemType: btrfs

enableLuksAutomatedPartitioning: true
initialEncryption: true

allowManualPartitioning: true

# LUKS2 with strong-by-default key derivation. argon2id is the
# OWASP/CIS recommendation; we override Calamares' historical pbkdf2
# default. Memory cost 1 GiB is comfortably resistant to commodity
# GPU cracking while still completing in <2s on every supported tier.
luksGeneration: luks2
luksHash: sha512
luksPbkdf: argon2id
luksPbkdfMemory: 1048576   # 1 GiB
luksPbkdfTime: 2000        # 2 seconds

# Filesystem label so /etc/orion-release etc. can find the install.
defaultPartitionTableType: gpt

partitionLayout:
  - name: orion-root
    filesystem: btrfs
    mountPoint: /
    size: 100%
    features:
      compress: zstd:1
