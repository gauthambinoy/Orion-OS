---
# Orion OS — Calamares settings (M2, P#2.6)
#
# Sequence the modules so partitioning happens before users-and-pkgs,
# and our orion-tpm-enroll runs AFTER the system is laid down (so
# the LUKS device exists) but BEFORE bootloader (so any crypttab
# regeneration sees the TPM token).

modules-search: [local, /usr/lib/calamares/modules]

instances:
  - id: orion-tpm-enroll
    module: shellprocess
    config: orion-tpm-enroll.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - initramfs
      - shellprocess@orion-tpm-enroll
      - grubcfg
      - bootloader
      - umount
  - show:
      - finished

branding: orion
prompt-install: false
dont-chroot: false
