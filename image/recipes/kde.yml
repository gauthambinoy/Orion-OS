# Orion OS — KDE Plasma recipe (M1, P#1.2)
#
# Aurora already ships KDE Plasma 6 on a Fedora Atomic base, so the bulk
# of the desktop is inherited. This recipe only:
#
#   1. Pins the small set of KDE packages we want to guarantee are
#      present on every Orion install (some Aurora variants strip them).
#   2. Removes a handful of KDE applets and applications we deliberately
#      do NOT want as part of the default Orion experience (per plan
#      §5.2: focused, AI-first desktop — fewer demos, more deliberate
#      defaults).
#   3. Reserves the structural slots where AI-aware KDE integration
#      (KRunner plugin, Plasma activity hooks) will land in M6.
#
# Anything user-visible at first boot — wallpapers, logo, plasma look-
# and-feel package — belongs in the branding recipe (P#1.8 placeholder,
# real assets in M8).

modules:
  # ---- 1. Packages we always want present + intentional removals ----
  - type: rpm-ostree
    install:
      # Core Plasma 6 desktop pieces. Listed even though Aurora installs
      # them, so a future Aurora variant cannot silently drop them on us.
      - plasma-desktop
      - plasma-workspace
      - plasma-systemmonitor
      - kwin
      - kde-cli-tools

      # Default Orion application set. Kept intentionally small; user-tier
      # bundles land in their own recipes.
      - dolphin                 # file manager
      - konsole                 # terminal
      - kate                    # default GUI text editor for AI prompts
      - kcalc                   # calculator
      - gwenview                # image viewer
      - okular                  # PDF / document viewer
      - ark                     # archive manager
      - spectacle               # used by AI screen-context feature in M6
      - kde-partitionmanager    # required at runtime by Calamares for custom partitioning (renamed from partitionmanager in F43)

    # Each removal is a deliberate product decision; if you want one
    # back, open a PR with rationale.
    #
    # NOTE: aurora-dx:43 ships a much trimmer KDE base than F41 and does
    # not pre-install kmail/akregator/korganizer/kontact or the legacy
    # KDE games. rpm-ostree errors out on `remove` of any package that
    # is not present, so the explicit remove list was emptied when the
    # base bumped F41 -> F43. The PRD intent (no PIM-suite, no toy
    # games, no demos in the default Orion image) is preserved by the
    # base image itself; future M2/M8 work that actually needs to drop
    # an installed package can re-introduce specific entries here after
    # confirming the package is in aurora-dx via:
    #   skopeo inspect docker://ghcr.io/ublue-os/aurora-dx:43
    remove: []

  # ---- 2. Default Plasma look-and-feel + flatpaks (slot reserved) ----
  # Slot for default-flatpaks lives in its own recipe (P#4.x) once we
  # decide the default app set. We do NOT include the module here with
  # an empty install list because the BlueBuild default-flatpaks
  # module errors out on an empty install (CONFIGURATION ERROR), and we
  # do NOT switch the global theme here either — that belongs to the
  # branding recipe so theming changes ship with their assets in a
  # single PR.

  # ---- 3. Files / dconf / kwriteconfig hooks ----
  # Reserved for M6 (AI-aware KDE integration). Keeping the section
  # present-but-empty so the structure is visible in reviews and the diff
  # in M6 is small and obvious.
  - type: files
    files: []
