# Orion OS — base recipe (M1, P#1.1)
#
# The minimum set of changes we apply to the Aurora base image to call
# the result "Orion". Anything user-visible (KDE config, branding) lives
# in later recipes; this one only handles identity files and the
# foundational packages every Orion install needs.
#
# Conservative on purpose: every line added here ships to every user, so
# we keep the surface tiny and grow it via dedicated recipes that each
# have their own PR and review.
#
# This file uses BlueBuild's `modules:` group form: a single document
# carrying a sequence of modules (BlueBuild 0.9.x cannot parse the
# multi-document "---" form for from-file targets).

modules:
  # ---- 1. Base packages ----
  # Tools we want available on every Orion install regardless of tier or
  # user choices. Anything optional belongs in a later recipe.
  #
  # rpm-ostree runs before the identity-file overlay so dnf still sees
  # the upstream Fedora os-release ($releasever) when fetching repo
  # metadata. Overlaying first would break $releasever resolution.
  - type: rpm-ostree
    install:
      # System administration essentials kept universal.
      - git
      - just            # task runner used by our justfile
      - jq              # used by orion-* scripts and tests
      - ripgrep         # required by semantic search indexer (M7)
      - fd-find         # required by semantic search indexer (M7)
      - age             # encrypted vector store + clipboard history (M5/M7)
    remove: []

  # ---- 2. Identity files written to the image ----
  # These overwrite the Aurora-provided files so users see "Orion OS" in
  # /etc/os-release, /etc/orion-release, and downstream tools that read
  # os-release metadata (e.g. neofetch, gnome-control-center, KInfoCenter).
  - type: files
    files:
      - source: ../files/etc/os-release
        destination: /etc/os-release
      - source: ../files/etc/orion-release
        destination: /etc/orion-release

    # ---- 3. systemd services we always want enabled ----
    # Reserved slot — additions land in their feature recipes (e.g. zram
    # in P#3.2). Not declared as an empty `systemd` module here because
    # the module errors out with empty enabled/disabled lists; the
    # module is added back when the first service entry lands.
