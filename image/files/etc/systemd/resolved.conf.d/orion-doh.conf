# Orion OS — DNS-over-HTTPS via systemd-resolved (M2, P#2.5)
#
# Plan section 5.1 names DNS-over-HTTPS as part of the security
# baseline. systemd-resolved gained native DoH support upstream in
# v257 (Fedora 41 ships a backport-capable build). This drop-in
# turns it on and pins the upstream resolvers we trust.
#
# Why three resolvers and not one:
#   - Diversity: a single resolver outage cannot black-hole DNS for
#     every Orion user simultaneously.
#   - All three publish strict no-logging policies and accept DoH
#     traffic on the standard 853-equivalent endpoint.
#
# Resolvers (with public keys / SNI for verification):
#   - 9.9.9.9    Quanta Quad9    (dns.quad9.net)     — malware filter on
#   - 1.1.1.1    Cloudflare       (cloudflare-dns.com) — fastest in most regions
#   - 8.8.8.8    Google Public DNS (dns.google)       — historical reliability
#
# DNSSEC=allow-downgrade: validate when the upstream offers it; fall
# back rather than break browsing on networks with broken middleboxes.
# Plan §5.1 prefers strict, but on a desktop a hard "yes" makes
# captive-portal sign-on impossible. allow-downgrade is the
# pragmatic upstream-recommended setting for desktops.
#
# DNSOverTLS=yes: even if a future change disables the DoH path,
# we still upgrade to DoT rather than fall to plain UDP/53.
#
# Cache=yes + DNSStubListener=yes: keep the stub on 127.0.0.53 so
# local consumers (NetworkManager, KDE, browsers) all get the same
# encrypted view.

[Resolve]
DNS=9.9.9.9#dns.quad9.net 1.1.1.1#cloudflare-dns.com 8.8.8.8#dns.google
FallbackDNS=149.112.112.112#dns.quad9.net 1.0.0.1#cloudflare-dns.com 8.8.4.4#dns.google
DNSOverTLS=yes
DNSSEC=allow-downgrade
Cache=yes
DNSStubListener=yes
