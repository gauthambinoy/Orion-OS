# Orion OS — kernel hardening sysctls (M2, P#2.3)
#
# Applied at boot via systemd-sysctl.service from /etc/sysctl.d/.
# Numbered "99-" so we run after distribution defaults and have the
# final word on every key listed below.
#
# Every line here is justified — Lynis (P#2.8) audits this set, and
# plan section 5.5 makes "Lynis hardening score >= 90" a release
# blocker. Removing or relaxing a key MUST come with an ADR.
#
# Categories below mirror the kernel.org and CIS Linux benchmark
# groupings so reviewers can map each line to its standard.

# -------- 1. Kernel exposure --------
# Hide kernel pointers from unprivileged users (KASLR-bypass mitigation).
kernel.kptr_restrict = 2

# Restrict access to kernel logs to root (otherwise unprivileged users
# can grep dmesg for crash addresses, secrets, etc.).
kernel.dmesg_restrict = 1

# Restrict perf_event_open to root + CAP_PERFMON. Mid-tier desktops
# never need unprivileged perf, and unprivileged perf is a recurring
# LPE vector.
kernel.perf_event_paranoid = 3

# Disable the legacy SysRq combo by default; advanced users can flip
# this back at runtime if they need a recovery handle.
kernel.sysrq = 0

# Disable kexec_load — prevents loading an unverified kernel at
# runtime even if root is compromised.
kernel.kexec_load_disabled = 1

# Restrict ptrace to direct parent <-> child only. Stops process
# injection across unrelated user processes.
kernel.yama.ptrace_scope = 1

# BPF JIT hardening on; BPF unprivileged off. We do not need
# unprivileged BPF on a desktop.
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# Userfaultfd is a known LPE primitive; keep it root-only.
vm.unprivileged_userfaultfd = 0

# -------- 2. Filesystem hardening --------
# Symlink/hardlink restrictions (TOCTOU and /tmp race mitigations).
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Lower the suid_dumpable to 0 — never produce coredumps from
# setuid binaries.
fs.suid_dumpable = 0

# -------- 3. Network — IPv4 --------
# Reverse-path filtering on (anti-spoofing).
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Drop source-routed packets — never legitimately needed on a desktop.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Ignore ICMP redirects.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log spoofed/source-routed/martian packets — useful when something
# is misbehaving on the LAN.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore broadcast pings (smurf-attack mitigation).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error replies.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# SYN cookies on (mitigates SYN flood DoS).
net.ipv4.tcp_syncookies = 1

# RFC1337 — protect against TIME-WAIT assassination.
net.ipv4.tcp_rfc1337 = 1

# -------- 4. Network — IPv6 --------
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Do not act as an IPv6 router.
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# -------- 5. Memory protections --------
# Make ASLR as strong as Linux supports.
kernel.randomize_va_space = 2

# mmap_min_addr — block NULL-deref-as-LPE on legacy kernels.
vm.mmap_min_addr = 65536
